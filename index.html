<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Jadwal RS</title>
    
    <!-- Library Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Tab Styles */
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { 
            background-color: white; 
            color: #2563EB; 
            border-bottom: 2px solid #2563EB;
            font-weight: bold;
        }
        .tab-btn:not(.active) {
            color: #6B7280;
            background-color: #F3F4F6;
        }
        .tab-btn:not(.active):hover {
            background-color: #E5E7EB;
            color: #374151;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden fade-in border border-gray-200">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-center text-white">
            <h1 class="text-2xl font-bold"><i class="fas fa-hospital-user mr-2"></i>Sistem Jadwal RS</h1>
            <p class="text-blue-100 text-xs mt-1 uppercase tracking-wider">Rekapitulasi & Arsip Digital</p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex border-b border-gray-200">
            <button onclick="switchTab('upload')" id="tab-upload" class="tab-btn active w-1/2 py-4 text-sm font-medium focus:outline-none">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Upload Data
            </button>
            <button onclick="switchTab('download')" id="tab-download" class="tab-btn w-1/2 py-4 text-sm font-medium focus:outline-none">
                <i class="fas fa-download mr-2"></i> Download Rekap
            </button>
        </div>

        <!-- CONTENT AREA -->
        <div class="p-8 relative">
            
            <!-- 1. SECTION UPLOAD -->
            <div id="section-upload" class="fade-in">
                <form id="uploadForm" class="space-y-5">
                    <!-- Bulan Upload -->
                    <div>
                        <label class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-wide">Bulan Laporan</label>
                        <select id="uploadMonth" required class="block w-full bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                            <option value="" disabled selected>-- Pilih Bulan --</option>
                            <option value="Januari">Januari</option>
                            <option value="Februari">Februari</option>
                            <option value="Maret">Maret</option>
                            <option value="April">April</option>
                            <option value="Mei">Mei</option>
                            <option value="Juni">Juni</option>
                            <option value="Juli">Juli</option>
                            <option value="Agustus">Agustus</option>
                            <option value="September">September</option>
                            <option value="Oktober">Oktober</option>
                            <option value="November">November</option>
                            <option value="Desember">Desember</option>
                        </select>
                    </div>

                    <!-- Ruangan -->
                    <div>
                        <label class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-wide">Asal Ruangan</label>
                        <select id="room" required class="block w-full bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                            <option value="" disabled selected>-- Pilih Ruangan --</option>
                            <option value="Ruang HD">Ruang HD</option>
                            <option value="Ruang ICCU">Ruang ICCU</option>
                            <option value="Ruang Rawat Inap 1">Ruang Rawat Inap 1</option>
                            <option value="Ruang Rawat Inap 2">Ruang Rawat Inap 2</option>
                            <option value="Ruang UGD">Ruang UGD</option>
                            <option value="Ruang Operasi">Ruang Operasi</option>
                            <option value="Ruang Bersalin">Ruang Bersalin</option>
                            <option value="Poli Rawat Jalan">Poli Rawat Jalan</option>
                        </select>
                    </div>

                    <!-- File Input -->
                    <div>
                        <label class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-wide">File Jadwal (.xlsx)</label>
                        <div class="relative">
                            <input id="fileInput" type="file" class="hidden" accept=".xlsx" required />
                            <label for="fileInput" class="flex items-center justify-between w-full p-3 border-2 border-dashed border-blue-200 rounded-lg cursor-pointer hover:bg-blue-50 transition group">
                                <div class="flex items-center">
                                    <div class="bg-blue-100 text-blue-600 p-2 rounded-md mr-3 group-hover:bg-blue-200 transition">
                                        <i class="fas fa-file-excel"></i>
                                    </div>
                                    <span id="fileNameDisplay" class="text-sm text-gray-500 font-medium">Pilih file...</span>
                                </div>
                                <span class="text-xs text-blue-500 font-bold uppercase">Browse</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="btnUpload" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg shadow-md transition transform hover:-translate-y-0.5 mt-2">
                        <i class="fas fa-paper-plane mr-2"></i> Upload & Proses
                    </button>
                </form>
            </div>

            <!-- 2. SECTION DOWNLOAD -->
            <div id="section-download" class="hidden fade-in">
                <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
                    <div class="flex items-start">
                        <i class="fas fa-info-circle text-green-600 mt-1 mr-3"></i>
                        <p class="text-sm text-green-800">Fitur ini akan mengunduh rekapitulasi lengkap untuk satu bulan terpilih dalam format Excel (.xlsx).</p>
                    </div>
                </div>

                <form id="downloadForm" class="space-y-6">
                    <div>
                        <label class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-wide">Pilih Bulan Rekap</label>
                        <select id="downloadMonth" required class="block w-full bg-white border border-gray-300 text-gray-700 py-3 px-4 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
                            <option value="" disabled selected>-- Pilih Bulan --</option>
                            <option value="Januari">Januari</option>
                            <option value="Februari">Februari</option>
                            <option value="Maret">Maret</option>
                            <option value="April">April</option>
                            <option value="Mei">Mei</option>
                            <option value="Juni">Juni</option>
                            <option value="Juli">Juli</option>
                            <option value="Agustus">Agustus</option>
                            <option value="September">September</option>
                            <option value="Oktober">Oktober</option>
                            <option value="November">November</option>
                            <option value="Desember">Desember</option>
                        </select>
                    </div>

                    <button type="submit" id="btnDownload" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-lg shadow-md transition transform hover:-translate-y-0.5">
                        <i class="fas fa-file-download mr-2"></i> Download Excel
                    </button>
                </form>
            </div>

            <!-- Loading Overlay (Shared) -->
            <div id="loading" class="hidden absolute inset-0 bg-white/90 z-50 flex flex-col justify-center items-center rounded-b-2xl">
                <div class="relative">
                    <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i class="fas fa-bolt text-blue-600 text-xs"></i>
                    </div>
                </div>
                <h3 class="text-gray-800 font-bold text-sm mt-4" id="loadingText">Memproses Data...</h3>
                <p class="text-gray-500 text-xs mt-1">Mohon tunggu sebentar</p>
            </div>

        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-400">&copy; 2024 RS Management System</p>
        </div>
    </div>

    <script>
        // URL SCRIPT ANDA
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5e8er60YVZ1m0r4Gn7RdkupWttdB1pyiXwD5Qdj7A1wF42abaSxy1QAvBhFI1Fone/exec';

        // --- TAB SWITCHING LOGIC ---
        function switchTab(tab) {
            const uploadSec = document.getElementById('section-upload');
            const downloadSec = document.getElementById('section-download');
            const tabUpload = document.getElementById('tab-upload');
            const tabDownload = document.getElementById('tab-download');

            if (tab === 'upload') {
                uploadSec.classList.remove('hidden');
                downloadSec.classList.add('hidden');
                tabUpload.classList.add('active');
                tabDownload.classList.remove('active');
            } else {
                uploadSec.classList.add('hidden');
                downloadSec.classList.remove('hidden');
                tabUpload.classList.remove('active');
                tabDownload.classList.add('active');
            }
        }

        // --- UI HELPERS ---
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');

        function toggleLoading(show, text = "Memproses...") {
            if (show) {
                loading.classList.remove('hidden');
                loadingText.textContent = text;
            } else {
                loading.classList.add('hidden');
            }
        }

        // --- UPLOAD HANDLER ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : "Pilih file...";
            document.getElementById('fileNameDisplay').textContent = fileName;
            document.getElementById('fileNameDisplay').classList.add('text-gray-800');
        });

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            
            if (fileInput.files.length === 0) {
                Swal.fire('Warning', 'Pilih file excel terlebih dahulu', 'warning');
                return;
            }

            toggleLoading(true, "Mengupload & Update Data...");

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const payload = {
                    action: 'upload', // Action Tag
                    filename: file.name,
                    file: e.target.result.split(',')[1],
                    room: document.getElementById('room').value,
                    month: document.getElementById('uploadMonth').value
                };

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    toggleLoading(false);
                    if (data.status === 'success') {
                        Swal.fire({
                            title: 'Sukses!',
                            text: `Data berhasil diupdate. (${data.data.updatedRows} baris)`,
                            icon: 'success'
                        });
                        document.getElementById('uploadForm').reset();
                        document.getElementById('fileNameDisplay').textContent = "Pilih file...";
                    } else {
                        throw new Error(data.message);
                    }
                })
                .catch(err => {
                    toggleLoading(false);
                    Swal.fire('Gagal', err.message, 'error');
                });
            };
            reader.readAsDataURL(file);
        });

        // --- DOWNLOAD HANDLER ---
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const month = document.getElementById('downloadMonth').value;

            toggleLoading(true, "Menyiapkan File Excel...");

            const payload = {
                action: 'download', // Action Tag
                month: month
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                toggleLoading(false);
                if (data.status === 'success') {
                    // Logic untuk trigger download dari base64
                    const link = document.createElement('a');
                    link.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + data.data.file;
                    link.download = data.data.filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    Swal.fire({
                        title: 'File Siap!',
                        text: `Rekap bulan ${month} berhasil didownload.`,
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    });
                } else {
                    throw new Error(data.message);
                }
            })
            .catch(err => {
                toggleLoading(false);
                Swal.fire('Gagal Download', err.message, 'error');
            });
        });
    </script>
</body>
</html>
