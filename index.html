<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Rekapitulasi Ruangan RS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden fade-in border border-blue-100">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 p-6 text-center text-white">
            <h1 class="text-2xl font-bold"><i class="fas fa-hospital-user mr-2"></i>E-Rekap RS</h1>
            <p class="text-blue-200 text-sm mt-1">Upload Laporan Bulanan Ruangan</p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <form id="rekapForm" class="space-y-5">
                
                <!-- Pilihan Bulan (PENTING UNTUK FOLDER) -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">
                        <i class="fas fa-calendar-alt mr-2 text-blue-500"></i>Bulan Laporan
                    </label>
                    <div class="relative">
                        <select id="month" required class="block w-full bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all appearance-none">
                            <option value="" disabled selected>-- Pilih Bulan --</option>
                            <option value="Januari">Januari</option>
                            <option value="Februari">Februari</option>
                            <option value="Maret">Maret</option>
                            <option value="April">April</option>
                            <option value="Mei">Mei</option>
                            <option value="Juni">Juni</option>
                            <option value="Juli">Juli</option>
                            <option value="Agustus">Agustus</option>
                            <option value="September">September</option>
                            <option value="Oktober">Oktober</option>
                            <option value="November">November</option>
                            <option value="Desember">Desember</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- Pilihan Ruangan -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">
                        <i class="fas fa-clinic-medical mr-2 text-blue-500"></i>Ruangan
                    </label>
                    <div class="relative">
                        <select id="room" required class="block w-full bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all appearance-none">
                            <option value="" disabled selected>-- Pilih Ruangan --</option>
                            <option value="Ruang HD">Ruang HD</option>
                            <option value="Ruang ICCU">Ruang ICCU</option>
                            <option value="Ruang Rawat Inap 1">Ruang Rawat Inap 1</option>
                            <option value="Ruang Rawat Inap 2">Ruang Rawat Inap 2</option>
                            <option value="Ruang UGD">Ruang UGD</option>
                            <option value="Ruang Operasi">Ruang Operasi</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- Input File -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">
                        <i class="fas fa-file-excel mr-2 text-green-600"></i>File Excel (.xlsx)
                    </label>
                    <div class="w-full">
                        <label for="fileInput" class="flex flex-col items-center justify-center w-full h-32 border-2 border-blue-200 border-dashed rounded-xl cursor-pointer bg-blue-50 hover:bg-blue-100 transition-all group">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center">
                                <i class="fas fa-cloud-upload-alt text-3xl text-blue-400 group-hover:text-blue-600 mb-2"></i>
                                <p class="text-sm text-gray-500 group-hover:text-gray-700 font-medium">Klik untuk upload file</p>
                                <p class="text-xs text-gray-400">Hanya format .xlsx</p>
                            </div>
                            <input id="fileInput" type="file" class="hidden" accept=".xlsx" required />
                        </label>
                    </div>
                    <p id="fileNameDisplay" class="text-xs text-center text-green-600 mt-2 font-semibold h-4"></p>
                </div>

                <!-- Submit -->
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 mt-2">
                    <i class="fas fa-save mr-2"></i> Simpan & Rekap
                </button>
            </form>

            <!-- Loading -->
            <div id="loading" class="hidden mt-6 text-center">
                <div class="flex justify-center items-center space-x-2 mb-2">
                    <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce delay-100"></div>
                    <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce delay-200"></div>
                </div>
                <p class="text-gray-700 text-sm font-semibold">Sedang Memproses...</p>
                <p class="text-xs text-gray-500">Membuat folder, menyimpan arsip, & merekap data.</p>
            </div>
        </div>
    </div>

    <script>
        // PASTE URL DEPLOYMENT GOOGLE SCRIPT ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby3rpUezIgW-9J5trsiNXttnHCt_B7dLnBNX8ntkRfbAbWj8XbktJ-kMcUOaPRx0jfj/exec';

        const form = document.getElementById('rekapForm');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const btnSubmit = document.getElementById('btnSubmit');
        const loading = document.getElementById('loading');

        fileInput.addEventListener('change', function(e) {
            fileNameDisplay.textContent = e.target.files[0] ? e.target.files[0].name : "";
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                Swal.fire('Error', 'Pilih file excel dulu!', 'error');
                return;
            }

            const room = document.getElementById('room').value;
            const month = document.getElementById('month').value;
            const file = fileInput.files[0];

            // Tampilkan Loading
            btnSubmit.classList.add('hidden');
            loading.classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const rawBase64 = e.target.result.split(',')[1];

                const payload = {
                    filename: file.name,
                    file: rawBase64,
                    room: room,
                    month: month // Mengirim data bulan ke script
                };

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        Swal.fire({
                            title: 'Sukses!',
                            text: `Data ${room} bulan ${month} berhasil direkap.`,
                            icon: 'success'
                        });
                        form.reset();
                        fileNameDisplay.textContent = "";
                    } else {
                        throw new Error(data.message);
                    }
                })
                .catch(error => {
                    Swal.fire('Gagal', error.message, 'error');
                })
                .finally(() => {
                    btnSubmit.classList.remove('hidden');
                    loading.classList.add('hidden');
                });
            };
        });
    </script>
</body>
</html>
