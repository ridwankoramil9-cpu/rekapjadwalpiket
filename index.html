<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekapitulasi Ruangan RS</title>
    <!-- Tailwind CSS untuk styling cepat & modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 untuk notifikasi pop-up -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-white text-2xl font-bold mb-1"><i class="fas fa-hospital-alt mr-2"></i>Sistem Upload Rekap</h1>
            <p class="text-blue-100 text-sm">Upload file Excel (.xlsx) per ruangan</p>
        </div>

        <!-- Form Area -->
        <div class="p-8">
            <form id="rekapForm" class="space-y-6">
                
                <!-- Input Ruangan -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="room">
                        <i class="fas fa-door-open mr-1"></i> Pilih Ruangan
                    </label>
                    <div class="relative">
                        <select id="room" required class="block appearance-none w-full bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-blue-500">
                            <option value="" disabled selected>-- Pilih Asal Data --</option>
                            <option value="Ruang HD">Ruang HD</option>
                            <option value="Ruang ICCU">Ruang ICCU</option>
                            <option value="Ruang UGD">Ruang UGD</option>
                            <option value="Ruang Rawat Inap 1">Ruang Rawat Inap 1</option>
                            <option value="Ruang Rawat Inap 2">Ruang Rawat Inap 2</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Input File -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="fileInput">
                        <i class="fas fa-file-excel mr-1"></i> File Excel (.xlsx)
                    </label>
                    <div class="flex items-center justify-center w-full">
                        <label for="fileInput" class="flex flex-col items-center justify-center w-full h-32 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition-colors">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <i class="fas fa-cloud-upload-alt text-3xl text-blue-500 mb-2"></i>
                                <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">Klik untuk upload</span></p>
                                <p class="text-xs text-gray-500">Format .xlsx only</p>
                            </div>
                            <input id="fileInput" type="file" class="hidden" accept=".xlsx" required />
                        </label>
                    </div>
                    <p id="fileNameDisplay" class="text-xs text-center text-gray-600 mt-2 font-medium"></p>
                </div>

                <!-- Tombol Submit -->
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline transition duration-300 transform hover:scale-105">
                    <i class="fas fa-paper-plane mr-2"></i> Kirim Data
                </button>
            </form>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden mt-6 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-200 border-t-blue-600"></div>
                <p class="text-gray-600 text-sm mt-2 font-semibold">Sedang memproses data...</p>
                <p class="text-gray-400 text-xs">Mohon jangan tutup halaman ini.</p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t">
            <p class="text-xs text-gray-400">&copy; 2024 Sistem Rekap Rumah Sakit</p>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI PENTING
        // Paste URL Web App dari Google Script Deploy di sini
        // ==========================================
        const SCRIPT_URL = 'GANTI_DENGAN_URL_WEB_APP_GOOGLE_SCRIPT_ANDA'; 

        // Tampilkan nama file saat user memilih file
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "";
            document.getElementById('fileNameDisplay').textContent = fileName ? "File terpilih: " + fileName : "";
        });

        document.getElementById('rekapForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('fileInput');
            const room = document.getElementById('room').value;
            const btnSubmit = document.getElementById('btnSubmit');
            const loading = document.getElementById('loading');

            if (fileInput.files.length === 0) {
                Swal.fire('Peringatan', 'Silakan pilih file Excel terlebih dahulu.', 'warning');
                return;
            }

            // UI State: Loading
            btnSubmit.classList.add('hidden');
            loading.classList.remove('hidden');

            const file = fileInput.files[0];
            const reader = new FileReader();

            // Baca file sebagai Data URL (Base64)
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const rawBase64 = e.target.result.split(',')[1]; // Hapus header data:application/...

                const payload = {
                    base64: rawBase64,
                    type: file.type,
                    name: file.name
                };

                // Kirim ke Google Apps Script
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        filename: file.name,
                        file: rawBase64,
                        room: room
                    })
                    // mode: 'no-cors' // JANGAN GUNAKAN no-cors agar kita bisa terima response JSON
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        Swal.fire({
                            title: 'Berhasil!',
                            text: `Data dari ${room} berhasil disimpan dan direkap. (${data.data.rowsAdded} baris)`,
                            icon: 'success',
                            confirmButtonColor: '#3085d6'
                        });
                        // Reset Form
                        document.getElementById('rekapForm').reset();
                        document.getElementById('fileNameDisplay').textContent = "";
                    } else {
                        throw new Error(data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    Swal.fire({
                        title: 'Gagal',
                        text: 'Terjadi kesalahan: ' + error.message,
                        icon: 'error',
                        footer: 'Pastikan file Excel tidak dikunci password.'
                    });
                })
                .finally(() => {
                    // Kembalikan UI ke semula
                    btnSubmit.classList.remove('hidden');
                    loading.classList.add('hidden');
                });
            };
        });
    </script>
</body>
</html>
