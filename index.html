<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Rekapitulasi Ruangan RS</title>
    <!-- Tailwind CSS untuk tampilan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 untuk notifikasi yang bagus -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Animasi kustom */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-slate-200 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden fade-in border border-gray-100">
        
        <!-- Header Section -->
        <div class="bg-blue-600 p-6 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-blue-700 opacity-20 transform skew-y-3"></div>
            <h1 class="text-white text-2xl font-bold relative z-10"><i class="fas fa-file-medical-alt mr-2"></i>E-Rekap Ruangan</h1>
            <p class="text-blue-100 text-sm relative z-10 mt-1">Upload Data Excel Harian/Bulanan</p>
        </div>

        <!-- Form Section -->
        <div class="p-8">
            <form id="rekapForm" class="space-y-5">
                
                <!-- Pilihan Ruangan -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2 ml-1" for="room">
                        <i class="fas fa-clinic-medical mr-2 text-blue-500"></i>Pilih Ruangan
                    </label>
                    <div class="relative">
                        <select id="room" required class="block w-full bg-gray-50 border border-gray-200 text-gray-700 py-3 px-4 pr-8 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>-- Pilih Sumber Data --</option>
                            <option value="Ruang HD">Ruang HD</option>
                            <option value="Ruang ICCU">Ruang ICCU</option>
                            <option value="Ruang Rawat Inap 1">Ruang Rawat Inap 1</option>
                            <option value="Ruang Rawat Inap 2">Ruang Rawat Inap 2</option>
                            <option value="Ruang UGD">Ruang UGD</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- Input File Upload -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">
                        <i class="fas fa-file-excel mr-2 text-green-600"></i>File Laporan (.xlsx)
                    </label>
                    <div class="w-full">
                        <label for="fileInput" class="flex flex-col items-center justify-center w-full h-36 border-2 border-blue-200 border-dashed rounded-xl cursor-pointer bg-blue-50/50 hover:bg-blue-50 hover:border-blue-400 transition-all group">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                                <i class="fas fa-cloud-upload-alt text-3xl text-blue-400 group-hover:text-blue-600 mb-2 transition-colors"></i>
                                <p class="mb-1 text-sm text-gray-500 group-hover:text-gray-700"><span class="font-semibold">Klik untuk upload</span></p>
                                <p class="text-xs text-gray-400">Format wajib: .xlsx</p>
                            </div>
                            <input id="fileInput" type="file" class="hidden" accept=".xlsx" required />
                        </label>
                    </div>
                    <!-- Tempat Menampilkan Nama File -->
                    <div id="fileInfo" class="hidden mt-3 p-3 bg-green-50 border border-green-100 rounded-lg flex items-center justify-between">
                        <div class="flex items-center overflow-hidden">
                            <i class="fas fa-file-csv text-green-600 mr-2 flex-shrink-0"></i>
                            <span id="fileNameDisplay" class="text-sm text-green-800 font-medium truncate">nama_file.xlsx</span>
                        </div>
                        <button type="button" id="clearFile" class="text-gray-400 hover:text-red-500 ml-2 focus:outline-none">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-300 transition-all transform hover:-translate-y-0.5 mt-2">
                    <i class="fas fa-paper-plane mr-2"></i> Kirim ke Rekap
                </button>
            </form>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden mt-6 text-center py-2">
                <div class="inline-flex items-center space-x-2">
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
                <p class="text-gray-600 text-sm mt-2 font-medium">Sedang memproses data ke Spreadsheet...</p>
                <p class="text-xs text-gray-400">Mohon jangan tutup halaman ini.</p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-400">Sistem Informasi Manajemen Rumah Sakit &copy; 2024</p>
        </div>
    </div>

    <script>
        // ==========================================
        // URL SCRIPT GOOGLE APPS SCRIPT
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby3rpUezIgW-9J5trsiNXttnHCt_B7dLnBNX8ntkRfbAbWj8XbktJ-kMcUOaPRx0jfj/exec';

        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const clearFileBtn = document.getElementById('clearFile');
        const form = document.getElementById('rekapForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const loading = document.getElementById('loading');

        // Handle File Selection Display
        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileNameDisplay.textContent = file.name;
                fileInfo.classList.remove('hidden');
                fileInfo.classList.add('fade-in');
            }
        });

        // Handle Clear File
        clearFileBtn.addEventListener('click', function() {
            fileInput.value = '';
            fileInfo.classList.add('hidden');
        });

        // Handle Form Submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            if (fileInput.files.length === 0) {
                Swal.fire({
                    icon: 'warning',
                    title: 'File Kosong',
                    text: 'Silakan pilih file Excel (.xlsx) terlebih dahulu!',
                    confirmButtonColor: '#2563EB'
                });
                return;
            }

            const room = document.getElementById('room').value;
            const file = fileInput.files[0];

            // UI Loading State
            btnSubmit.classList.add('hidden');
            loading.classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            
            reader.onload = function(e) {
                const rawBase64 = e.target.result.split(',')[1]; 

                const payload = {
                    filename: file.name,
                    file: rawBase64,
                    room: room
                };

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        Swal.fire({
                            title: 'Sukses!',
                            html: `Data <b>${room}</b> berhasil direkap.<br><span class="text-sm text-gray-500">${data.data.rowsAdded} data pegawai ditambahkan.</span>`,
                            icon: 'success',
                            confirmButtonColor: '#2563EB'
                        });
                        // Reset Form
                        form.reset();
                        fileInfo.classList.add('hidden');
                    } else {
                        throw new Error(data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    Swal.fire({
                        title: 'Gagal',
                        text: 'Terjadi kesalahan sistem: ' + error.message,
                        icon: 'error',
                        confirmButtonColor: '#EF4444'
                    });
                })
                .finally(() => {
                    btnSubmit.classList.remove('hidden');
                    loading.classList.add('hidden');
                });
            };
            
            reader.onerror = function() {
                Swal.fire('Error', 'Gagal membaca file.', 'error');
                btnSubmit.classList.remove('hidden');
                loading.classList.add('hidden');
            };
        });
    </script>
</body>
</html>
